name: reusable_iap
description: Headless Flutter in-app purchase service for catalog loading, purchases, restores, entitlements, and verification.
version: 0.1.0

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

topics:
  - in-app-purchase
  - subscriptions
  - billing
  - monetization

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
